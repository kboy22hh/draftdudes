        }

            color: #8a92a4;

        }

        .container {

            margin: 0 auto;
            padding: 0 2rem;
        }

        .controls {

            gap: 1rem;
            margin-bottom: 2rem;

            align-items: center;
        }

        .filter-group {

            align-items: center;
        }

            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8a92a4;
            font-weight: 500;
        }

            color: #c0c8d8;
            padding: 0.6rem 0.8rem;
            font-family: 'Rajdhani', monospace;
            font-size: 0.9rem;
            border-radius: 2px;
            cursor: pointer;
        }

        select:hover, input:hover {
            border-color: #ffffff;
        }

        .bigboard {

            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .rank-tier {
            margin-bottom: 2rem;
        }

        .tier-header {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.1em;

            margin-bottom: 1.5rem;

            border-bottom-color: #ffd700;
        }

        .tier-header.tier2 {
            color: #c0c8d8;
            border-bottom-color: #c0c8d8;
        }

        .tier-header.tier3 {
            color: #8a92a4;
            border-bottom-color: #8a92a4;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

            background: #0f1419;
            border: 1px solid #c0c8d8;
            border-left: 4px solid #c0c8d8;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .prospect-card:hover {
            background: #161b24;
            border-color: #ffffff;
            border-left-color: #ffffff;
            transform: translateY(-2px);
        }

        .prospect-card.tier1 {
            border-left-color: #ffd700;
        }

        .prospect-card.tier1:hover {
            border-left-color: #ffed4e;
        }

        .prospect-card.tier2 {
            border-left-color: #c0c8d8;
        }

        .prospect-card.tier3 {
            border-left-color: #8a92a4;
        }

            font-size: 2.5rem;
            font-weight: bold;
            color: #c0c8d8;
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            opacity: 0.3;

        }

            color: #ffffff;
            font-weight: 700;
            margin-bottom: 0.3rem;

            color: #8a92a4;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 400;

            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-family: 'Rajdhani', monospace;

            border-left: 2px solid #1a2f5e;

            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1a2f5e;
            margin-bottom: 1rem;

            background: #050810;
            padding: 0.8rem;

            top: 0;
            width: 100%;
            height: 100%;

            width: 90%;

            top: 1.5rem;

            border: none;

            margin-bottom: 2rem;
            padding-right: 2rem;

            font-size: 2.2rem;
            text-transform: uppercase;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 0.3rem;

            font-size: 0.9rem;
            color: #8a92a4;

            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #c0c8d8;
            border-bottom: 1px solid #8a92a4;
            padding-bottom: 0.5rem;
            margin-bottom: 0.8rem;
            font-weight: 500;

            gap: 1rem;
            margin-bottom: 1.5rem;

            padding: 0.8rem;

</head>

        function populatePositions() {
            const positions = [...new Set(prospects.map(p => p.position))].sort();
            const select = document.getElementById('positionFilter');
            positions.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                option.textContent = pos;
                select.appendChild(option);
            });
        }

        function renderBigBoard(filtered) {
            const board = document.getElementById('bigboard');
            board.innerHTML = '';

            const tiers = ['tier1', 'tier2', 'tier3'];
            const tierLabels = {
                tier1: 'Elite Prospects',
                tier2: 'Star Prospects',
                tier3: 'Strong Prospects'
            };
            const tierClasses = {
                tier1: 'tier1',
                tier2: 'tier2',
                tier3: 'tier3'
            };

            tiers.forEach(tier => {
                const tierProspects = filtered.filter(p => p.tier === tier);
                if (tierProspects.length === 0) return;

                const tierDiv = document.createElement('div');
                tierDiv.className = 'rank-tier';
                
                const header = document.createElement('div');
                header.className = `tier-header ${tierClasses[tier]}`;
                header.textContent = tierLabels[tier];
                
                const rowDiv = document.createElement('div');
                rowDiv.className = 'prospects-row';
                
                tierProspects.forEach(prospect => {
                    const card = createProspectCard(prospect);
                    rowDiv.appendChild(card);
                });

                tierDiv.appendChild(header);
                tierDiv.appendChild(rowDiv);
                board.appendChild(tierDiv);
            });
        }

        function createProspectCard(prospect) {
            const card = document.createElement('div');
            card.className = `prospect-card ${prospect.tier}`;
            card.onclick = () => openModal(prospect);

            card.innerHTML = `
                <div class="rank-badge">${prospect.rank}</div>
                <div class="prospect-name">${prospect.name}</div>
                <div class="prospect-position">${prospect.position}</div>
                <div class="prospect-team">${prospect.team}</div>
                <div class="prospect-pick">Pick ${prospect.pick}</div>
                <div class="prospect-summary">${prospect.summary}</div>
                <div class="tags">
                    ${prospect.tags.map(tag => `<div class="tag">${tag}</div>`).join('')}
                </div>
            `;

            return card;
        }

        function openModal(prospect) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalName').textContent = prospect.name;
            document.getElementById('modalPosition').textContent = prospect.position;
            document.getElementById('modalTeam').textContent = prospect.team;
            document.getElementById('modalPick').textContent = `#${prospect.pick}`;

            let body = `
                <div class="report-section">
                    <div class="report-section-title">Overview</div>
                    <div class="report-text">${prospect.report}</div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">Strengths</div>
                    <div class="report-text">
                        <ul>
                            ${prospect.strengths.map(s => `<li>${s}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="report-section">
                    <div class="report-section-title">Weaknesses</div>
                    <div class="report-text">
                        <ul>
                            ${prospect.weaknesses.map(w => `<li>${w}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;

            document.getElementById('modalBody').innerHTML = body;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function filterProspects() {
            const position = document.getElementById('positionFilter').value;
            const tier = document.getElementById('tierFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();

            let filtered = prospects;

            if (position) {
                filtered = filtered.filter(p => p.position === position);
            }

            if (tier) {
                filtered = filtered.filter(p => p.tier === tier);
            }

            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) || 
                    p.team.toLowerCase().includes(search)
                );
            }

            renderBigBoard(filtered);
        }

        document.getElementById('positionFilter').addEventListener('change', filterProspects);
        document.getElementById('tierFilter').addEventListener('change', filterProspects);
        document.getElementById('searchFilter').addEventListener('input', filterProspects);

        window.closeModal = closeModal;

        populatePositions();
        renderBigBoard(prospects);
    </script>
